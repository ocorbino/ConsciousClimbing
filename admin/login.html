<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Conscious Climbing</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="../styles.css?v=2.1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <img src="../assets/logo-mountains.jpg" alt="Conscious Climbing logo">
                </div>
                <h1>Admin Login</h1>
                <p>Conscious Climbing</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>

                <button type="submit" class="btn btn-primary btn-large login-btn" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loading" style="display: none;">
                        <svg class="spinner" viewBox="0 0 24 24" width="20" height="20">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="32" stroke-linecap="round"></circle>
                        </svg>
                        Signing in...
                    </span>
                </button>
            </form>

            <div class="login-footer">
                <a href="../index.html">Back to Website</a>
            </div>
        </div>
    </div>

    <script>
        // Login form submission
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const usernameInput = document.getElementById('username');

        async function initializeLoginPage() {
            const lastUsername = localStorage.getItem('admin_last_username');
            if (lastUsername && !usernameInput.value) usernameInput.value = lastUsername;

            // Verify existing token first; only check setup if no valid session exists.
            const existingToken = localStorage.getItem('admin_token');
            if (existingToken) {
                try {
                    const verifyRes = await fetch('/api/auth/verify', {
                        headers: { 'Authorization': `Bearer ${existingToken}` }
                    });
                    const verifyData = await verifyRes.json();
                    if (verifyData.valid) {
                        window.location.href = '/admin/';
                        return;
                    }
                } catch (_) {
                    // If verify call fails, continue to setup check below.
                }
                localStorage.removeItem('admin_token');
                localStorage.removeItem('admin_user');
            }

            try {
                const setupRes = await fetch('/api/auth/setup');
                const setupData = await setupRes.json();
                if (setupData.setupRequired) {
                    window.location.href = '/admin/setup.html';
                }
            } catch (_) {
                // Keep login screen visible if API is temporarily unavailable.
            }
        }

        initializeLoginPage();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Please enter username and password');
                return;
            }

            // Show loading state
            loginBtn.querySelector('.btn-text').style.display = 'none';
            loginBtn.querySelector('.btn-loading').style.display = 'inline-flex';
            loginBtn.disabled = true;
            errorMessage.style.display = 'none';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Store token and redirect
                    localStorage.setItem('admin_token', data.token);
                    localStorage.setItem('admin_user', JSON.stringify(data.user));
                    localStorage.setItem('admin_last_username', username);
                    window.location.href = '/admin/';
                } else {
                    showError(data.error || 'Login failed. Please try again.');
                }
            } catch (error) {
                showError('Connection error. Please try again.');
            } finally {
                loginBtn.querySelector('.btn-text').style.display = 'inline';
                loginBtn.querySelector('.btn-loading').style.display = 'none';
                loginBtn.disabled = false;
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }
    </script>
</body>
</html>
