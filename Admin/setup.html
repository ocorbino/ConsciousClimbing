<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Setup | Collin's Mobile Mechanics</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="../styles.css?v=2.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <div class="login-header">
                <div class="login-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
                    </svg>
                </div>
                <h1>Admin Setup</h1>
                <p>Create your admin account</p>
            </div>

            <form id="setupForm" class="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autocomplete="username" placeholder="Choose a username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Choose a password (min 6 characters)" minlength="6">
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" placeholder="Confirm your password">
                </div>

                <div id="errorMessage" class="error-message" style="display: none;"></div>
                <div id="successMessage" class="password-success" style="display: none;"></div>

                <button type="submit" class="btn btn-primary btn-large login-btn" id="setupBtn">
                    <span class="btn-text">Create Admin Account</span>
                    <span class="btn-loading" style="display: none;">
                        <svg class="spinner" viewBox="0 0 24 24" width="20" height="20">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" fill="none" stroke-dasharray="32" stroke-linecap="round"></circle>
                        </svg>
                        Creating...
                    </span>
                </button>
            </form>

            <div class="login-footer">
                <a href="../index.html">Back to Website</a>
            </div>
        </div>
    </div>

    <script>
        // Check if setup is still needed
        fetch('/api/auth/setup')
            .then(res => res.json())
            .then(data => {
                if (!data.setupRequired) {
                    // Admin already exists, redirect to login
                    window.location.href = '/admin/login.html';
                }
            })
            .catch(() => {});

        const form = document.getElementById('setupForm');
        const setupBtn = document.getElementById('setupBtn');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (!username || !password) {
                showError('Please fill in all fields');
                return;
            }

            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            // Show loading
            setupBtn.querySelector('.btn-text').style.display = 'none';
            setupBtn.querySelector('.btn-loading').style.display = 'inline-flex';
            setupBtn.disabled = true;
            errorMessage.style.display = 'none';

            try {
                const response = await fetch('/api/auth/setup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    successMessage.textContent = 'Admin account created! Redirecting to login...';
                    successMessage.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/admin/login.html';
                    }, 2000);
                } else {
                    showError(data.error || 'Setup failed. Please try again.');
                    setupBtn.querySelector('.btn-text').style.display = 'inline';
                    setupBtn.querySelector('.btn-loading').style.display = 'none';
                    setupBtn.disabled = false;
                }
            } catch (error) {
                showError('Connection error. Please try again.');
                setupBtn.querySelector('.btn-text').style.display = 'inline';
                setupBtn.querySelector('.btn-loading').style.display = 'none';
                setupBtn.disabled = false;
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
            successMessage.style.display = 'none';
        }
    </script>
</body>
</html>
